pre-commit:
  jobs:
    - name: lint-and-typecheck
      group:
        parallel: true
        jobs:
          - name: lint
            glob: "*.{ts,tsx}"
            run: bunx eslint --fix {staged_files}
          - name: typecheck
            glob: "*.{ts,tsx}"
            run: bun run typecheck
    - name: format
      glob: "*.{ts,tsx,json,md,css}"
      run: bunx prettier --write {staged_files}

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
